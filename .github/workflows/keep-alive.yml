name: Supabase keep-alive
on:
  schedule:
    - cron: '17 6 * * *'   # всеки ден 06:17 UTC (нечетна минута — извън пиковите слотове)
  workflow_dispatch: {}     # позволява и ръчно пускане от Actions таба
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Debug — проверка на секретите (без разкриване на стойности)
        run: |
          echo "URL дължина: ${#SUPABASE_URL}"
          echo "KEY дължина: ${#SUPABASE_SERVICE_ROLE_KEY}"
          echo "URL начало: ${SUPABASE_URL:0:24}"
          echo "KEY начало: ${SUPABASE_SERVICE_ROLE_KEY:0:6}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Вкарай keep-alive ред
        run: |
          curl -sS -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{}' --fail-with-body
      - name: Изчисти редове по-стари от 7 дни
        run: |
          curl -sS -X DELETE \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?pinged_at=lt.$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --fail-with-body
